<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Shield -->
  <path d="M256 20 
           L460 80 
           V240 
           C460 360 360 460 256 500 
           C152 460 52 360 52 240 
           V80 Z"
        fill="white" stroke="#0f6b4f" stroke-width="12"/>

  <!-- SVA Text -->
  <text x="50%" y="130" text-anchor="middle"
        font-size="80" font-weight="bold"
        fill="#0f6b4f" font-family="Arial">
    SVA
  </text>

  <!-- Attendance Text -->
  <text x="50%" y="180" text-anchor="middle"
        font-size="30"
        fill="#0f6b4f" font-family="Arial">
    ATTENDANCE
  </text>

  <!-- Clipboard -->
  <rect x="160" y="220" width="190" height="180" rx="15"
        fill="none" stroke="#222" stroke-width="6"/>

  <!-- Clip top -->
  <rect x="220" y="200" width="70" height="30" rx="10"
        fill="#222"/>

  <!-- Checkboxes -->
  <rect x="180" y="250" width="25" height="25"
        fill="none" stroke="#0f6b4f" stroke-width="4"/>
  <polyline points="182,265 192,275 205,255"
            fill="none" stroke="#0f6b4f" stroke-width="4"/>

  <rect x="180" y="290" width="25" height="25"
        fill="none" stroke="#0f6b4f" stroke-width="4"/>
  <polyline points="182,305 192,315 205,295"
            fill="none" stroke="#0f6b4f" stroke-width="4"/>

  <rect x="180" y="330" width="25" height="25"
        fill="none" stroke="#0f6b4f" stroke-width="4"/>
  <polyline points="182,345 192,355 205,335"
            fill="none" stroke="#0f6b4f" stroke-width="4"/>

  <!-- User Check Circle -->
  <circle cx="340" cy="360" r="40" fill="#0f6b4f"/>
  <circle cx="340" cy="345" r="10" fill="white"/>
  <path d="M325 370 Q340 355 355 370"
        fill="white"/>
  <polyline points="330,360 338,370 355,345"
            fill="none" stroke="white" stroke-width="4"/>
</svg>